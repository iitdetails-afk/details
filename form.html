<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Indian Info Tech — Application Form</title>
<link rel="stylesheet" href="theme.css">
<style>
  :root{
    --paper:#fcf8f0;
    --ink:#213446;
    --navy:#13263d;
    --brass:#9a7634;
    --rule:#d7cdb8;
    --accent:#8b2234;
    --soft:#f3ebdc;
  }
  *{box-sizing:border-box;}
  @page { size: A4; margin: 8mm; }
  body{
    margin:0;
    min-height:100vh;
    background:linear-gradient(135deg,#efe3cb 0%,#e7d9bb 45%,#e4dccf 100%);
    font-family:'Georgia','Times New Roman',serif;
    color:var(--ink);
    padding:16px;
    display:flex;
    justify-content:center;
  }
  .sheet{
    background:#fffdf9;
    width:100%;
    max-width:780px;
    padding:30px 40px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
    position:relative;
    border-radius:12px;
    border:1px solid var(--rule);
  }
  .top-nav{display:flex;flex-wrap:wrap;gap:10px;justify-content:flex-end;margin-bottom:20px;}
  .top-nav a{text-decoration:none;color:var(--navy);padding:8px 12px;border:1px solid var(--rule);border-radius:999px;background:#fffdf9;font-size:13px;font-weight:600;}
  .top-nav a.active{background:var(--navy);color:#fff;border-color:var(--navy);} 
  
  .crest{
    display:flex; flex-direction:column; align-items:center; gap:6px;
    margin-bottom:15px;
  }
  .crest img{
    width:110px;height:70px;object-fit:contain;
  }
  
  h1.title{
    text-align:center;
    font-size:22px;
    letter-spacing:.1em;
    margin:10px 0 25px;
    text-decoration:underline;
    text-underline-offset:6px;
    text-transform:uppercase;
    color:var(--navy);
    font-weight:bold;
  }

  /* Personal Details Layout */
  .personal-details-container {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 20px;
    margin-bottom: 12px;
  }
  .left-fields {
    flex: 1;
  }
  .right-photo {
    flex-shrink: 0;
  }
  
  .field-row {
    display: flex;
    align-items: flex-end;
    margin-bottom: 14px;
  }
  .field-row.tall {
    align-items: flex-start;
  }
  .field-label {
    font-size: 15px;
    color: var(--navy);
    font-weight: 600;
    width: 140px;
    flex-shrink: 0;
  }
  .field-colon {
    font-size: 15px;
    color: var(--navy);
    font-weight: 600;
    width: 20px;
    flex-shrink: 0;
  }
  .line-input {
    border: none;
    border-bottom: 1px dotted #555;
    background: transparent;
    font-family: inherit;
    font-size: 15px;
    color: var(--ink);
    padding: 2px 4px;
    flex: 1;
    width: 100%;
  }
  .line-input:focus {
    outline: none;
    border-bottom: 1px solid var(--navy);
  }
  textarea.line-input {
    resize: none;
    min-height: 52px;
    line-height: 1.4;
  }
  
  /* Photo Box */
  .photo-box {
    width: 120px;
    height: 140px;
    border: 1px solid #777;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    text-align: center;
    color: #444;
    font-weight: bold;
    overflow: hidden;
    background: transparent;
    padding: 4px;
    line-height: 1.4;
  }
  .photo-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
    border-radius: 8px;
  }
  
  /* Contact Details Layout */
  .contact-details-container {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 20px;
    margin-bottom: 12px;
  }
  .left-contact {
    flex: 1;
  }
  .right-contact {
    width: 260px;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 15px;
  }
  
  .mobile-row {
    display: flex;
    align-items: flex-start;
  }
  .mobile-inputs {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .mobile-input-item {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .mobile-input-item span {
    font-size: 15px;
    font-weight: bold;
    color: var(--navy);
  }
  
  .email-row {
    display: flex;
    align-items: flex-end;
    width: 100%;
  }
  .email-row .field-label {
    width: 75px;
    font-size: 14px;
  }
  
  .pincode-container {
    display: flex;
    justify-content: flex-start;
    padding-left: 75px;
  }
  .pincode-box-custom {
    border: 1px solid #555;
    border-radius: 8px;
    width: 150px;
    padding: 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .pincode-label {
    font-size: 11px;
    font-weight: bold;
    color: #555;
    margin-bottom: 2px;
  }
  .pincode-val {
    border: none;
    background: transparent;
    font-size: 16px;
    font-weight: bold;
    text-align: center;
    width: 100%;
    outline: none;
  }
  
  /* Course row */
  .course-row {
    display: flex;
    align-items: center;
    margin-bottom: 15px;
  }
  .course-row .field-label {
    width: 160px;
  }
  .course-box-custom {
    border: 1px solid #555;
    border-radius: 4px;
    flex: 1;
    padding: 6px 12px;
  }
  .course-input {
    border: none;
    background: transparent;
    width: 100%;
    font-size: 16px;
    font-weight: bold;
    outline: none;
    font-family: inherit;
  }
  
  /* How Know & Signature */
  .know-signature-container {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 20px;
    margin-bottom: 12px;
  }
  .know-field {
    flex: 1;
  }
  .field-label-block {
    display: block;
    font-size: 15px;
    font-weight: 600;
    color: var(--navy);
    margin-bottom: 8px;
  }
  .signature-field {
    flex-shrink: 0;
  }
  .signature-box-custom {
    border: 1px solid #555;
    border-radius: 8px;
    width: 220px;
    padding: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 70px;
    justify-content: space-between;
  }
  .signature-label {
    font-size: 11px;
    font-weight: bold;
    color: #555;
  }
  .signature-val {
    border: none;
    background: transparent;
    font-family: 'Brush Script MT', cursive, Georgia, serif;
    font-size: 18px;
    text-align: center;
    width: 100%;
    outline: none;
  }
  
  /* Divider */
  .thick-divider {
    border: none;
    border-top: 1.5px solid #333;
    margin: 15px 0;
  }
  
  /* Office Use Only */
  .office-title {
    text-align: center;
    font-size: 16px;
    text-decoration: underline;
    text-underline-offset: 5px;
    letter-spacing: 0.1em;
    margin: 15px 0;
    color: var(--navy);
    font-weight: bold;
    text-transform: uppercase;
  }
  
  .office-container {
    display: flex;
    justify-content: space-between;
    align-items: stretch;
    gap: 15px;
  }
  .office-left, .office-right {
    width: 38%;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .office-middle {
    width: 20%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .office-box-custom {
    border: 1px solid #555;
    border-radius: 4px;
    padding: 6px 10px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-height: 48px;
  }
  .office-box-label {
    font-size: 11px;
    color: #555;
    font-weight: bold;
    margin-bottom: 2px;
  }
  .office-box-val {
    border: none;
    background: transparent;
    font-size: 14px;
    font-weight: bold;
    outline: none;
    padding: 0;
    font-family: inherit;
  }
  
  .term-print-container {
    border: 1px solid #555;
    border-radius: 4px;
    width: 100%;
    overflow: hidden;
  }
  .term-print-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 10px;
    font-size: 12px;
    font-weight: bold;
    border-bottom: 1px solid #555;
    background: #fff;
  }
  .term-print-item:last-child {
    border-bottom: none;
  }
  .term-cb {
    width: 15px;
    height: 15px;
    cursor: pointer;
  }
  
  .actions{
    display:flex; justify-content:center; gap:14px; margin-top:30px; flex-wrap:wrap;
  }
  button{
    font-family:'Georgia',serif;
    font-size:14px;
    letter-spacing:.05em;
    padding:10px 22px;
    border:1px solid var(--navy);
    background:var(--navy);
    color:#fff;
    cursor:pointer;
    border-radius:999px;
    box-shadow:0 6px 14px rgba(19,38,61,.12);
    transition:transform .2s ease, box-shadow .2s ease;
  }
  button.secondary{background:transparent;color:var(--navy);}
  button:hover{opacity:.95;transform:translateY(-1px);box-shadow:0 8px 18px rgba(19,38,61,.16);}
  
  @media print{
    @page { size: A4; margin: 6mm; }
    html, body{width:210mm; height:297mm; margin:0; padding:0; background:#fff; overflow:hidden; display:block;}
    body{display:block;}
    .sheet{
      box-shadow:none;
      border-radius:0;
      padding:0;
      border:none;
      width:100%;
      background:transparent;
      height: 268mm;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .top-nav, .actions{display:none !important;}
    .crest{margin-bottom:8px;}
    .crest img{width:80px;height:50px;}
    h1.title{font-size:15px; margin:2px 0 10px;}
    .personal-details-container {
      margin-bottom: 8px;
    }
    .field-row {
      margin-bottom: 8px;
    }
    .field-label, .field-colon, .field-label-block, .mobile-input-item span {
      color: #000 !important;
      font-size: 13px;
    }
    .line-input {
      font-size: 13px;
      border-bottom: none !important;
      padding: 1px 2px;
    }
    textarea.line-input {
      min-height: 36px;
    }
    .photo-box {
      width: 95px;
      height: 110px;
      border: 1px solid #000 !important;
      border-radius: 8px;
      font-size: 10px;
    }
    .contact-details-container {
      margin-bottom: 8px;
    }
    .mobile-inputs {
      gap: 6px;
    }
    .email-row {
      margin-bottom: 10px;
    }
    .pincode-container {
      padding-left: 75px;
    }
    .pincode-box-custom {
      padding: 4px;
      width: 140px;
    }
    .pincode-label {
      font-size: 9px;
    }
    .pincode-val {
      font-size: 14px;
    }
    .course-row {
      margin-bottom: 10px;
    }
    .course-box-custom {
      padding: 4px 10px;
    }
    .know-signature-container {
      margin-bottom: 10px;
    }
    .signature-box-custom {
      width: 200px;
      min-height: 60px;
      padding: 6px;
    }
    .pincode-box-custom, .course-box-custom, .signature-box-custom, .office-box-custom, .term-print-container {
      border: 1px solid #000 !important;
    }
    .pincode-label, .signature-label, .office-box-label {
      color: #000 !important;
      font-size: 9px;
    }
    .pincode-val, .course-input, .signature-val, .office-box-val {
      font-size: 13px;
    }
    .office-title {
      font-size: 14px;
      margin: 10px 0;
    }
    .office-container {
      gap: 10px;
    }
    .office-left, .office-right {
      gap: 8px;
    }
    .office-box-custom {
      min-height: 42px;
      padding: 4px 8px;
    }
    .term-print-item {
      font-size: 11px;
      border-bottom: 1px solid #000 !important;
      padding: 4px 8px;
    }
    .term-print-item.checked {
      background: #ddd !important;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      position: relative;
    }
    .term-print-item.checked::after {
      content: '✓';
      position: absolute;
      right: 8px;
      font-weight: bold;
      font-size: 12px;
    }
    .term-cb {
      display: none;
    }
    .thick-divider {
      border-top: 1.5px solid #000 !important;
      margin: 10px 0;
    }
  }
  @media (max-width:768px){
    .sheet{padding:20px;}
    .personal-details-container {
      flex-direction: column-reverse;
      align-items: stretch;
    }
    .photo-box {
      margin: 0 auto 15px;
    }
    .contact-details-container {
      flex-direction: column;
      gap: 15px;
    }
    .right-contact {
      width: 100%;
      align-items: flex-start;
    }
    .pincode-container {
      padding-left: 0;
    }
    .know-signature-container {
      flex-direction: column;
      align-items: stretch;
      gap: 15px;
    }
    .signature-box-custom {
      width: 100%;
    }
    .office-container {
      flex-direction: column;
      gap: 15px;
    }
    .office-left, .office-right, .office-middle {
      width: 100%;
    }
  }

  /* ── Camera Modal & Admin Photo Controls ── */
  .camera-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10000;
  }
  .camera-modal-overlay.active {
    display: flex;
  }
  .camera-modal {
    background: #fff;
    border-radius: 12px;
    padding: 20px;
    width: 480px;
    max-width: 90%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  }
  .camera-stream-wrapper-custom {
    width: 100%;
    height: 320px;
    border-radius: 8px;
    overflow: hidden;
    background: #000;
    position: relative;
  }
  .camera-stream-wrapper-custom video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .camera-modal-actions {
    display: flex;
    gap: 12px;
    width: 100%;
    justify-content: center;
  }
  .camera-modal-actions button {
    font-family: inherit;
    padding: 8px 20px;
    border-radius: 6px;
    cursor: pointer;
  }
  .btn-capture {
    background: var(--navy);
    color: #fff;
    border: 1px solid var(--navy);
  }
  .btn-close {
    background: #eee;
    color: #333;
    border: 1px solid #ccc;
  }
  
  .photo-controls-admin {
    display: flex;
    justify-content: center;
    gap: 5px;
    margin-top: 8px;
  }
  .btn-photo-action {
    font-size: 11px;
    padding: 5px 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    background: #fff;
    color: #333;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-photo-action:hover {
    background: #f5f5f5;
  }
  .btn-photo-action.remove {
    color: #ef4444;
  }
  
  @media print {
    .photo-controls-admin {
      display: none !important;
    }
  }
</style>
</head>
<body>
<div class="sheet">
  <div class="top-nav">
    <a href="details.html">Details</a>
    <a class="active" href="form.html">Application Form</a>
    <a href="ss.html">Saved Submissions</a>
  </div>
  <div class="crest">
    <img src="logo.png" alt="IIT logo" onerror="this.onerror=null; this.src='iit-logo.svg';">
    <div class="brand">Indian Info Tech</div>
    <div class="brand" style="font-size:9px;letter-spacing:.2em;color:var(--ink);">Enrich Your Innovation</div>
  </div>


 
  <h1 class="title">Application</h1>
 
  <form id="appForm">
    <!-- Personal Details Container -->
    <div class="personal-details-container">
      <div class="left-fields">
        <div class="field-row">
          <label class="field-label" for="name">Name</label>
          <span class="field-colon">:</span>
          <input class="line-input" id="name" name="name" type="text">
        </div>
        <div class="field-row">
          <label class="field-label" for="yearDept">Year/Dept</label>
          <span class="field-colon">:</span>
          <input class="line-input" id="yearDept" name="yearDept" type="text">
        </div>
        <div class="field-row">
          <label class="field-label" for="collegeSchool">College/School</label>
          <span class="field-colon">:</span>
          <input class="line-input" id="collegeSchool" name="collegeSchool" type="text">
        </div>
        <div class="field-row tall">
          <label class="field-label" for="address">Address</label>
          <span class="field-colon">:</span>
          <textarea class="line-input" id="address" name="address" rows="2"></textarea>
        </div>
      </div>
      <div class="right-photo">
        <div class="photo-box" id="photoBox">
          <img id="photoPreview" alt="Uploaded photo">
          <span id="photoPlaceholder">Fix photo<br>If You Have</span>
        </div>
        <!-- Admin Photo Actions -->
        <div class="photo-controls-admin">
          <input type="file" id="photoInput" accept="image/*" style="display:none;">
          <button type="button" class="btn-photo-action" onclick="triggerPhotoUpload()">📁 Upload</button>
          <button type="button" class="btn-photo-action" onclick="openCameraModal()">📷 Camera</button>
          <button type="button" class="btn-photo-action remove" onclick="removePhoto()">🗑 Remove</button>
        </div>
      </div>
    </div>

    <!-- Camera Modal Overlay -->
    <div class="camera-modal-overlay" id="cameraModal">
      <div class="camera-modal">
        <h3>Capture Photo</h3>
        <div class="camera-stream-wrapper-custom">
          <video id="cameraVideo" autoplay playsinline></video>
          <canvas id="cameraCanvas" style="display:none;"></canvas>
        </div>
        <div class="camera-modal-actions">
          <button type="button" class="btn-capture" onclick="capturePhotoAdmin()">📸 Capture</button>
          <button type="button" class="btn-close" onclick="closeCameraModal()">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Contact Details Container -->
    <div class="contact-details-container">
      <div class="left-contact">
        <div class="mobile-row">
          <label class="field-label" for="mobile1">Mo:No</label>
          <span class="field-colon">:</span>
          <div class="mobile-inputs">
            <div class="mobile-input-item">
              <span>1.</span>
              <input class="line-input" id="mobile1" name="mobile1" type="tel">
            </div>
            <div class="mobile-input-item">
              <span>2.</span>
              <input class="line-input" id="mobile2" name="mobile2" type="tel">
            </div>
          </div>
        </div>
      </div>
      <div class="right-contact">
        <div class="email-row">
          <label class="field-label" for="email">email-id:</label>
          <input class="line-input" id="email" name="email" type="email">
        </div>
        <div class="pincode-container">
          <div class="pincode-box-custom">
            <div class="pincode-label">Pincode:</div>
            <input class="pincode-val" id="pincode" name="pincode" type="text" maxlength="6">
          </div>
        </div>
      </div>
    </div>

    <!-- Title Course / Project -->
    <div class="course-row">
      <label class="field-label" for="title">Title Course/project</label>
      <span class="field-colon">:</span>
      <div class="course-box-custom">
        <input class="course-input" id="title" name="title" type="text">
      </div>
    </div>

    <!-- How Know & Student Signature -->
    <div class="know-signature-container">
      <div class="know-field">
        <label class="field-label-block" for="howKnow">How you Know about this institute?</label>
        <input class="line-input" id="howKnow" name="howKnow" type="text">
      </div>
      <div class="signature-field">
        <div class="signature-box-custom">
          <div class="signature-label">Student Signature</div>
          <input class="signature-val" id="signature" name="signature" type="text">
        </div>
      </div>
    </div>

    <!-- Divider Line -->
    <div class="divider-line-container">
      <hr class="thick-divider">
    </div>

    <!-- Office Use Only Section -->
    <h2 class="office-title">OFFICE USE ONLY</h2>

    <div class="office-container">
      <div class="office-left">
        <div class="office-box-custom">
          <div class="office-box-label">Fees Fixed:</div>
          <input class="office-box-val" id="feesFixed" name="feesFixed" type="text">
        </div>
        <div class="office-box-custom">
          <div class="office-box-label">Date of Joining:</div>
          <input class="office-box-val" id="dateJoining" name="dateJoining" type="text">
        </div>
      </div>
      <div class="office-middle">
        <div class="term-print-container" id="termBox">
          <div class="term-print-item" id="termRow1">
            <span>Term 1</span>
            <input class="term-cb" type="checkbox" id="term1" name="term1">
          </div>
          <div class="term-print-item" id="termRow2">
            <span>Term 2</span>
            <input class="term-cb" type="checkbox" id="term2" name="term2">
          </div>
          <div class="term-print-item" id="termRow3">
            <span>Term 3</span>
            <input class="term-cb" type="checkbox" id="term3" name="term3">
          </div>
          <div class="term-print-item" id="termRow4">
            <span>Term 4</span>
            <input class="term-cb" type="checkbox" id="term4" name="term4">
          </div>
        </div>
      </div>
      <div class="office-right">
        <div class="office-box-custom">
          <div class="office-box-label">Certificate no:</div>
          <input class="office-box-val" id="certNo" name="certNo" type="text">
        </div>
        <div class="office-box-custom">
          <div class="office-box-label">Date of issue:</div>
          <input class="office-box-val" id="dateIssue" name="dateIssue" type="text">
        </div>
      </div>
    </div>
  </form>
 
  <div class="actions">
    <button type="submit" form="appForm">Submit Application</button>
    <button type="button" onclick="window.location.href='details.html'">Go Back to Details</button>
    <button type="button" onclick="window.location.href='ss.html'">View Saved Submissions</button>
    <button type="button" onclick="window.print()">Print / Save PDF</button>
    <button type="button" class="secondary" id="downloadBtn">Download as JSON</button>
    <button type="button" class="secondary" id="resetBtn">Clear form</button>
  </div>

</div>
 
<script>
  const form = document.getElementById('appForm');
  const STORAGE_KEY = 'indianInfoTechSubmissions';
  const COUNTER_KEY = 'indianInfoTechSubmissionCounter';
  const DETAILS_KEY = 'indianInfoTechUserDetails';
  const photoPreview = document.getElementById('photoPreview');
  const photoPlaceholder = document.getElementById('photoPlaceholder');
  const termRows = {
    term1: document.getElementById('termRow1'),
    term2: document.getElementById('termRow2'),
    term3: document.getElementById('termRow3'),
    term4: document.getElementById('termRow4')
  };

  function getSubmissions() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    } catch {
      return [];
    }
  }

  function saveSubmissions(submissions) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(submissions));
  }

  function generateSubmissionId() {
    let counter = parseInt(localStorage.getItem(COUNTER_KEY) || '0', 10);
    counter += 1;
    localStorage.setItem(COUNTER_KEY, String(counter));
    return `ID-${String(counter).padStart(4, '0')}`;
  }

  function setPhotoPreview(dataUrl) {
    if (!photoPreview || !photoPlaceholder) return;
    if (dataUrl) {
      photoPreview.src = dataUrl;
      photoPreview.style.display = 'block';
      photoPlaceholder.style.display = 'none';
    } else {
      photoPreview.removeAttribute('src');
      photoPreview.style.display = 'none';
      photoPlaceholder.style.display = 'block';
    }
  }

  function updateTermDisplay() {
    Object.entries(termRows).forEach(([key, row]) => {
      if (!row || !form.elements[key]) return;
      if (form.elements[key].checked) {
        row.classList.remove('unchecked');
        row.classList.add('checked');
      } else {
        row.classList.add('unchecked');
        row.classList.remove('checked');
      }
    });
  }

  function collectFormData() {
    const data = Object.fromEntries(new FormData(form).entries());
    ['term1', 'term2', 'term3', 'term4'].forEach((key) => {
      data[key] = Boolean(form.elements[key].checked);
    });
    data.photo = form.dataset.photo || '';
    return data;
  }

  function getSubmissionIdFromUrl() {
    return new URLSearchParams(window.location.search).get('submissionId')?.trim() || '';
  }

  async function loadSubmissionById(submissionId) {
    if (!submissionId) return null;

    try {
      const response = await fetch('/api/submissions');
      if (response.ok) {
        const submissions = await response.json();
        if (Array.isArray(submissions)) {
          return submissions.find((item) => String(item.submissionId) === submissionId) || null;
        }
      }
    } catch (err) {
      console.warn('Unable to load submissions from server', err);
    }

    try {
      const submissions = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      return Array.isArray(submissions) ? submissions.find((item) => String(item.submissionId) === submissionId) || null : null;
    } catch (err) {
      console.warn('Unable to load submissions from local storage', err);
      return null;
    }
  }

  function applySubmissionToForm(data) {
    if (!data || typeof data !== 'object') return false;

    Object.entries(data).forEach(([key, value]) => {
      const field = form.elements[key];
      if (!field) return;
      if (field.type === 'checkbox') {
        field.checked = Boolean(value);
      } else if (!['photo', 'submissionId', 'submittedAt'].includes(key)) {
        field.value = value;
      }
    });

    if (data.photo) {
      form.dataset.photo = data.photo;
      setPhotoPreview(data.photo);
    } else {
      form.dataset.photo = '';
      setPhotoPreview('');
    }
    updateTermDisplay();
    return true;
  }

  async function loadSavedDetails() {
    const submissionId = getSubmissionIdFromUrl();
    if (submissionId) {
      const topNav = document.querySelector('.top-nav');
      if (topNav) topNav.style.display = 'none';
      
      const actions = document.querySelector('.actions');
      if (actions) {
        actions.innerHTML = `
          <button type="submit" form="appForm">💾 Save Details</button>
          <button type="button" class="secondary" onclick="window.location.href='admin.html'">← Back to Admin Panel</button>
        `;
      }
      
      const submission = await loadSubmissionById(submissionId);
      if (submission && applySubmissionToForm(submission)) {
        return;
      }
    }

    try {
      const response = await fetch('/api/details');
      if (response.ok) {
        const details = await response.json();
        if (details && typeof details === 'object') {
          applySubmissionToForm(details);
          return;
        }
      }
    } catch (err) {
      console.warn('Unable to load saved details from server', err);
    }

    try {
      const details = JSON.parse(localStorage.getItem(DETAILS_KEY) || '{}');
      applySubmissionToForm(details);
    } catch (err) {
      console.warn('Unable to load saved details from local storage', err);
    }
  }

  form.addEventListener('submit', async (event) => {
    event.preventDefault();
    const data = collectFormData();
    
    const editingId = getSubmissionIdFromUrl();
    if (editingId) {
      data.submissionId = editingId;
    } else {
      data.submissionId = '';
    }

    try {
      const response = await fetch('/api/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      if (response.ok) {
        const responseData = await response.json();
        if (responseData.success && responseData.saved) {
          const savedSubmission = responseData.saved;
          const submissions = getSubmissions();
          if (editingId) {
            const idx = submissions.findIndex(s => s.submissionId === editingId);
            if (idx !== -1) {
              submissions[idx] = savedSubmission;
            } else {
              submissions.push(savedSubmission);
            }
          } else {
            submissions.push(savedSubmission);
          }
          saveSubmissions(submissions);
        }
      } else {
        throw new Error('Server error');
      }
    } catch (err) {
      console.warn('Unable to save submission to server, falling back to local storage', err);
      if (!editingId) {
        data.submissionId = generateSubmissionId();
        data.submittedAt = new Date().toLocaleString();
        const submissions = getSubmissions();
        submissions.push(data);
        saveSubmissions(submissions);
      } else {
        const submissions = getSubmissions();
        const existing = submissions.find(s => s.submissionId === editingId);
        data.submittedAt = existing ? existing.submittedAt : new Date().toLocaleString();
        const idx = submissions.findIndex(s => s.submissionId === editingId);
        if (idx !== -1) {
          submissions[idx] = data;
        } else {
          submissions.push(data);
        }
        saveSubmissions(submissions);
      }
    }

    // Clear active draft details since this submission is now completed and saved permanently
    localStorage.removeItem(DETAILS_KEY);
    try {
      await fetch('/api/details', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({})
      });
    } catch (err) {
      console.warn('Unable to clear active details on server', err);
    }

    form.reset();
    form.dataset.photo = '';
    setPhotoPreview('');
    if (editingId) {
      window.location.href = 'admin.html';
    } else {
      window.location.href = 'ss.html';
    }
  });

  ['term1', 'term2', 'term3', 'term4'].forEach((key) => {
    form.elements[key]?.addEventListener('change', updateTermDisplay);
  });
 
  document.getElementById('downloadBtn').addEventListener('click', () => {
    const data = collectFormData();
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = (data.name ? data.name.replace(/\s+/g,'_') : 'application') + '.json';
    a.click();
    URL.revokeObjectURL(url);
  });
 
  document.getElementById('resetBtn').addEventListener('click', () => {
    form.reset();
    form.dataset.photo = '';
    setPhotoPreview('');
    updateTermDisplay();
  });

  // ── Photo Upload & Webcam Logic for Admin ──
  let cameraStream = null;

  function triggerPhotoUpload() {
    document.getElementById('photoInput').click();
  }

  document.getElementById('photoInput').addEventListener('change', (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      form.dataset.photo = reader.result;
      setPhotoPreview(reader.result);
    };
    reader.readAsDataURL(file);
  });

  function removePhoto() {
    form.dataset.photo = '';
    setPhotoPreview('');
    document.getElementById('photoInput').value = '';
  }

  async function openCameraModal() {
    document.getElementById('cameraModal').classList.add('active');
    try {
      cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
      const vid = document.getElementById('cameraVideo');
      if (vid) {
        vid.srcObject = cameraStream;
        vid.play();
      }
    } catch(e) {
      alert('Camera access denied. Please upload a file instead.');
      closeCameraModal();
    }
  }

  function closeCameraModal() {
    document.getElementById('cameraModal').classList.remove('active');
    if (cameraStream) {
      cameraStream.getTracks().forEach(t => t.stop());
      cameraStream = null;
    }
    const vid = document.getElementById('cameraVideo');
    if (vid) vid.srcObject = null;
  }

  function capturePhotoAdmin() {
    const vid = document.getElementById('cameraVideo');
    const cvs = document.getElementById('cameraCanvas');
    if (vid && cvs) {
      cvs.width = vid.videoWidth || 640;
      cvs.height = vid.videoHeight || 480;
      cvs.getContext('2d').drawImage(vid, 0, 0);
      const dataUrl = cvs.toDataURL('image/jpeg');
      form.dataset.photo = dataUrl;
      setPhotoPreview(dataUrl);
      closeCameraModal();
    }
  }

  loadSavedDetails();
</script>
<script src="theme.js"></script>
 
</body>
</html>
